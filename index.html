<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha - Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand" class="previous-display"></div>
            <div id="current-operand" class="current-display">0</div>
        </div>
        <div class="buttons">
            <button onclick="clearScreen()" class="span-two btn-clear">AC</button>
            <button onclick="deleteNumber()" class="btn-delete">DEL</button>
            <button onclick="appendOperator('/')" class="btn-operator">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendOperator('*')" class="btn-operator">&times;</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendOperator('-')" class="btn-operator">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendOperator('+')" class="btn-operator">+</button>
            
            <button onclick="appendNumber('.')" class="btn-dot">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button onclick="compute()" class="span-two btn-equals">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
